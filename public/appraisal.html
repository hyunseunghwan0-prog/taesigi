<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>태식이 - 감정서 검토 프로그램</title>
  <link rel="stylesheet" href="appraisal.css" />
</head>
<body>
  <header>
    <div class="header-title">
      <img src="taesigi_logo.png" alt="태식이 로고" class="logo-img" />
      <div>
        <h1>태식이</h1>
        <span class="subtitle">감정서 검토 프로그램</span>
      </div>
    </div>
    <a href="/">← 메인으로</a>
  </header>

  <div class="container">

    <div class="upload-zone" id="dropZone">
      <div class="icon">📄</div>
      <p>감정평가서 PDF를 여기에 끌어다 놓거나<br>클릭하여 선택하세요</p>
      <div class="file-name" id="fileName"></div>
      <input type="file" id="fileInput" accept=".pdf,application/pdf" />
    </div>

    <div style="text-align:center;">
      <button class="btn" id="reviewBtn" disabled>검토 시작</button>
    </div>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar-bg"><div class="progress-bar" id="progressBar"></div></div>
      <div class="progress-label" id="progressLabel">PDF 분석 중...</div>
    </div>

    <div id="errorBox"></div>

    <!-- 검토 결과 -->
    <div id="results">
      <div class="summary-bar" id="summaryBar"></div>
      <div id="sectionResults"></div>
    </div>

    <!-- 태식이 피드백 (하단) -->
    <div id="feedbackZone" style="display:none;">
      <div class="feedback-zone-header">
        <span class="dog-icon">🐶</span>
        <div>
          <strong>태식이가 놓친 게 있나요?</strong>
          <p>프로그램이 잡지 못한 오류를 알려주시면 태식이가 똑똑해집니다.</p>
        </div>
      </div>
      <div class="missed-form">
        <textarea id="missedDesc" placeholder="예) 6페이지 획지조건 요인치는 0.95인데 텍스트엔 우세라고 되어있음"></textarea>
        <div style="display:flex;align-items:center;gap:10px;margin-top:8px;">
          <button class="send-btn" onclick="submitMissed()">피드백 보내기</button>
          <span id="missedSent" style="font-size:0.82rem;color:#1e8449;"></span>
        </div>
      </div>

      <!-- 패턴 분석 -->
      <div class="analyze-panel" id="analyzePanel">
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">
          <div>
            <strong>🔬 태식이 업그레이드</strong>
            <div id="feedbackStats" style="font-size:0.82rem;color:#777;margin-top:2px;"></div>
          </div>
          <button class="btn" id="analyzeBtn" style="margin:0;padding:8px 20px;font-size:0.88rem;">AI 패턴 분석</button>
        </div>
        <div id="analyzeResult" style="display:none;margin-top:16px;">
          <div class="analyze-result" id="analyzeText"></div>
          <div id="codeProposal" style="display:none;">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-top:12px;">
              <strong style="font-size:0.88rem;">제안된 체커 코드</strong>
              <button class="copy-btn" onclick="copyCode()">복사</button>
            </div>
            <div class="code-block" id="proposedCode"></div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script src="appraisal.js"></script>
</body>
</html>
